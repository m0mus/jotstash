name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain (+ clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry / target
        uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        run: cargo test --verbose

      # Run clippy informationally. We don't `-D warnings` yet — a few
      # pre-existing lints need cleanup; see the roadmap.
      - name: cargo clippy
        run: cargo clippy --all-targets
